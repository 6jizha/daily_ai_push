名称: 每天发邮件
启用:
计划:
    - cron: '0 0 * * *'
工作流触发:
作业:
发送:
运行于: ubuntu-latest
步骤:
      - uses: actions/checkout@v5      # 升级到 v5
      - uses: actions/setup-python@v6  # 升级到 v6
使用:
python版本: '3.11'
      - 名称: 安装依赖
        run: pip install requests resend
      - 名称: 运行推送
环境:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
        run: python daily_job.py
